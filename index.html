<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спортлото / Бинго</title>
  <style>
    /* Основные стили для страницы */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1e272e;
      color: white;
      padding: 30px;
      margin: 0;
    }

    /* Стили барабана */
    #drum {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 8px solid #808e9b;
      /* Полупрозрачный градиент для эффекта стеклянной сферы */
      background: radial-gradient(circle at 100px 100px, rgba(255,255,255,0.1), rgba(0,0,0,0.6));
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
    }

    /* Стили шариков внутри барабана */
    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.5);
      /* Убираем плавность transition при анимации движения для производительности */
    }

    /* Стили для вытянутых шариков (результат) */
    .ball.drawn {
      position: static;
      margin: 5px;
      width: 50px;
      height: 50px;
      font-size: 20px;
      animation: popOut 0.5s ease-out;
    }

    @keyframes popOut {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Контейнер для вытянутых шаров */
    #result {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      width: 80%;
      max-width: 600px;
      min-height: 80px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      border: 1px dashed #485460;
    }

    /* Кнопка */
    button {
      padding: 12px 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #0fbcf9;
      border: none;
      color: #1e272e;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    button:hover { background: #4bcffa; }
    button:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    button:disabled { background: #808e9b; cursor: not-allowed; color: #d2dae2; }
  </style>
</head>
<body>

  <h2>Лото Барабан</h2>
  <div id="drum"></div>
  <button id="drawBtn">Вытянуть шар</button>
  <div id="result"></div>

  <script>
    const drum = document.getElementById('drum');
    const resultDiv = document.getElementById('result');
    const drawBtn = document.getElementById('drawBtn');

    const TOTAL_BALLS = 36;       // Количество шаров
    const DRUM_RADIUS = 150;      // Радиус барабана (половина от width: 300px)
    const BALL_RADIUS = 20;       // Радиус шарика (половина от width: 40px)

    const balls = [];
    // Палитра цветов для шариков
    const colors = ['#ff3f34', '#0be881', '#3c40c6', '#ffc048', '#0fbcf9', '#f53b57'];

    // 1. Создаем шарики и добавляем их в барабан
    for (let i = 1; i <= TOTAL_BALLS; i++) {
      const el = document.createElement('div');
      el.className = 'ball';
      el.innerText = i;
      el.style.backgroundColor = colors[i % colors.length];

      drum.appendChild(el);

      // Задаем случайную начальную позицию и скорость для каждого шарика
      balls.push({
        el: el,
        x: (Math.random() - 0.5) * 100, 
        y: (Math.random() - 0.5) * 100,
        vx: (Math.random() - 0.5) * 15, // Скорость по оси X
        vy: (Math.random() - 0.5) * 15, // Скорость по оси Y
        drawn: false // Флаг: вытянут ли шар
      });
    }

    // 2. Функция анимации (движение и отскок от круглых стен)
    function animate() {
      balls.forEach(b => {
        if (b.drawn) return; // Если шар уже вытянут, не анимируем его внутри

        // Применяем скорость к позиции
        b.x += b.vx;
        b.y += b.vy;

        // Вычисляем расстояние от центра (0, 0)
        const dist = Math.sqrt(b.x * b.x + b.y * b.y);
        const maxDist = DRUM_RADIUS - BALL_RADIUS;

        // Если шарик выходит за пределы барабана (сталкивается со стенкой)
        if (dist > maxDist) {
          // Вектор нормали к точке столкновения
          const nx = b.x / dist;
          const ny = b.y / dist;

          // Скалярное произведение вектора скорости на нормаль
          const dot = b.vx * nx + b.vy * ny;

          // Отражаем вектор скорости (упругий отскок)
          b.vx -= 2 * dot * nx;
          b.vy -= 2 * dot * ny;

          // Возвращаем шарик внутрь границы барабана
          b.x = nx * maxDist;
          b.y = ny * maxDist;

          // Добавляем каплю случайности, чтобы шарики не застревали в одинаковых траекториях
          b.vx += (Math.random() - 0.5) * 1;
          b.vy += (Math.random() - 0.5) * 1;
        }

        // Преобразуем координаты от центра для CSS (top, left)
        const left = b.x + DRUM_RADIUS - BALL_RADIUS;
        const top = b.y + DRUM_RADIUS - BALL_RADIUS;
        
        b.el.style.left = left + 'px';
        b.el.style.top = top + 'px';
      });

      // Зацикливаем анимацию с частотой обновления монитора (обычно 60 FPS)
      requestAnimationFrame(animate);
    }

    // Запускаем физику
    animate();

    // 3. Логика кнопки "Вытянуть шар"
    drawBtn.addEventListener('click', () => {
      // Ищем только те шары, которые еще внутри барабана
      const availableBalls = balls.filter(b => !b.drawn);
      
      if (availableBalls.length === 0) return;

      // Выбираем случайный шар из доступных
      const randomIndex = Math.floor(Math.random() * availableBalls.length);
      const selected = availableBalls[randomIndex];

      // Помечаем как вытянутый
      selected.drawn = true;

      // Перемещаем элемент из барабана в контейнер результатов
      selected.el.classList.add('drawn');
      selected.el.style.left = 'auto'; // Сбрасываем абсолютное позиционирование
      selected.el.style.top = 'auto';
      resultDiv.appendChild(selected.el);

      // Если шаров не осталось — выключаем кнопку
      if (availableBalls.length === 1) {
        drawBtn.disabled = true;
        drawBtn.innerText = "Шаров больше нет";
      }
    });
  </script>
</body>
</html>
